name: PrivateTourAi
options:
  bundleIdPrefix: com.privatetourai
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  FirebaseAuth:
    url: https://github.com/firebase/firebase-ios-sdk
    version: 11.12.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    version: 8.0.0
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm
    version: 5.18.0
  Ferrostar:
    url: https://github.com/stadiamaps/ferrostar
    from: 0.21.0
  MapLibreSwiftUI:
    url: https://github.com/maplibre/swiftui-dsl
    from: 0.25.0

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: U3972W2GDJ
    PRODUCT_BUNDLE_IDENTIFIER: com.privatetourai.app

targets:
  PrivateTourAi:
    type: application
    platform: iOS
    sources:
      - path: PrivateTourAi
        excludes:
          - "**/.DS_Store"
    resources:
      - path: PrivateTourAi/Resources/Assets.xcassets
      - path: PrivateTourAi/Resources/GoogleService-Info.plist
      - path: PrivateTourAi/Resources/Subscriptions.storekit
    scheme:
      testTargets:
        - PrivateTourAiTests
    dependencies:
      - package: FirebaseAuth
        product: FirebaseAuth
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - package: RevenueCat
        product: RevenueCat
      - package: Ferrostar
        product: FerrostarCore
      - package: Ferrostar
        product: FerrostarMapLibreUI
      - package: Ferrostar
        product: FerrostarSwiftUI
      - package: MapLibreSwiftUI
        product: MapLibreSwiftUI
      - package: MapLibreSwiftUI
        product: MapLibreSwiftDSL
    entitlements:
      path: PrivateTourAi/PrivateTourAi.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    info:
      path: PrivateTourAi/Info.plist
      properties:
        CFBundleDisplayName: wAIpoint
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.801121217326-6v9ha3uo49ocqjd9mhp5fc019qgurv2r
        GIDClientID: "801121217326-6v9ha3uo49ocqjd9mhp5fc019qgurv2r.apps.googleusercontent.com"
        NSLocationWhenInUseUsageDescription: "wAIpoint needs your location to provide GPS-triggered narration during tours."
        NSLocationAlwaysAndWhenInUseUsageDescription: "wAIpoint needs continuous location access to trigger audio narration as you drive through your tour route."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        MARKETING_VERSION: "2.2"
        CURRENT_PROJECT_VERSION: 3
        CODE_SIGN_ENTITLEMENTS: PrivateTourAi/PrivateTourAi.entitlements

  PrivateTourAiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PrivateTourAiTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: PrivateTourAi
      - package: Ferrostar
        product: FerrostarCore
      - package: Ferrostar
        product: FerrostarMapLibreUI
      - package: Ferrostar
        product: FerrostarSwiftUI
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
